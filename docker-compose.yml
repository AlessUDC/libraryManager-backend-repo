name: libraryManager
version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: libraryManager-postgres
    environment:
      POSTGRES_USER: libraryManager_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: libraryManager_db
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
